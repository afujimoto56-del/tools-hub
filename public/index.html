<!DOCTYPE html>

<link rel="canonical" href="https://dooguya.com/">

<body>
<div class="wrap">

  <header class="masthead">
    <p class="eyebrow">小さな道具置き場</p>

  <main>
    <section class="bins" aria-label="道具の一覧">

        <span class="open">ひらく →</span>

  <footer class="foot">
