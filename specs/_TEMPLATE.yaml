# =====================================================================
# 道具屋 / ツールspec フォーマット（1ツール = 1 YAML）
# ---------------------------------------------------------------------
# 雛形 兼 仕様書。新しいツールはこれをコピーして埋める。
# generator（spec → 単一HTMLツール）がこの形を読んでUIとロジックを作る。
# =====================================================================

# --- 必須 ---------------------------------------------------------------
id: tool-slug                 # URLスラッグ＝tool_id。半角英数とハイフンのみ。
                              # 公開URLは https://dooguya.com/tools/<id>/ になる。
title: ツールの名前            # <title> と H1。
summary: >                    # 1〜2文（〜120字）。meta description 兼 ページ冒頭の説明。
  何をするか、誰の何の手間を消すかを一言で。

target_query: 狙う 検索 クエリ  # 最初の賭け（仮説）。外れて当然。
segment: そのうち系            # ゆるい括り（例: お金, 文章, 日付, 印刷もの）。
                              # 当たりの塊が見えたら、この括りで一覧ページを建てる材料。
launched_at: 2026-01-01       # 公開日 'YYYY-MM-DD'。年齢の起点。作成時に今日の日付を入れる。

# --- ツールの中身（generator がこれを実装する） -------------------------
inputs:
  - key: example_num
    label: 入力の見出し
    type: number              # number / text / select / date / checkbox
    unit: 円                  # 任意
    min: 0
    default: 0
  - key: example_choice
    label: 選択肢の見出し
    type: select
    options: [A, B, C]
    default: A

outputs:
  - 計算/生成された主結果
  - 補助的に出すと親切な値（あれば）

logic: |
  入力からどう出力を作るかを式や手順で具体的に書く。
  境界条件（0除算・空入力・上限）も書く。

# --- 仕上げ -------------------------------------------------------------
print: false                  # true で印刷ボタン＋印刷用CSS。
copyable: false               # true で結果にコピーボタン。
related: []                   # 内部リンクするツールの id 配列（任意）。
notes: ""
